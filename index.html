<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio Digital</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>🍔 Buiu Sanduíches</h1>
  <p>Peça rápido pelo WhatsApp</p>
</div>

<div class="container">

  <!-- PRODUTOS -->

  <div class="produto">
    <img src="img/xcamarão.jpeg" alt="X Camarão">
    <div class="info">
      <b>X Camarão</b><br>R$20
    </div>
    <div class="controles">
      <button onclick="remover('XCamarao')">-</button>
      <span id="qtd-XCamarao" class="quantidade">0</span>
      <button onclick="add('XCamarao', 20)">+</button>
    </div>
  </div>

  <div class="produto">
    <img src="img/franCoração.jpeg" alt="Frango com Coração">
    <div class="info">
      <b>Frango com Coração</b><br>R$18
    </div>
    <div class="controles">
      <button onclick="remover('FrangoCoracao')">-</button>
      <span id="qtd-FrangoCoracao" class="quantidade">0</span>
      <button onclick="add('FrangoCoracao', 18)">+</button>
    </div>
  </div>

  <div class="produto">
    <img src="img/xcaseiro.jpeg" alt="X Caseiro">
    <div class="info">
      <b>X Caseiro</b><br>R$15
    </div>
    <div class="controles">
      <button onclick="remover('XCaseiro')">-</button>
      <span id="qtd-XCaseiro" class="quantidade">0</span>
      <button onclick="add('XCaseiro', 15)">+</button>
    </div>
  </div>

  <div class="produto">
    <img src="img/megaBuiuEspecial.jpeg" alt="Mega Buiu Especial">
    <div class="info">
      <b>Mega Buiu Especial</b><br>R$25
    </div>
    <div class="controles">
      <button onclick="remover('MegaBuiu')">-</button>
      <span id="qtd-MegaBuiu" class="quantidade">0</span>
      <button onclick="add('MegaBuiu', 25)">+</button>
    </div>
  </div>

  <!-- CARRINHO -->
  <div class="carrinho">
    <h3>🛒 Seu Pedido</h3>
    <div id="lista"></div>
    <p class="total">Total: R$ <span id="total">0</span></p>

    <button class="finalizar" onclick="enviar()">
      Finalizar no WhatsApp
    </button>
  </div>

  <!-- INFORMAÇÕES -->
  <div class="footer">
    <p><b>📍 Endereço:</b> Natal/RN</p>
    <p><b>🕒 Horário:</b> 18h às 23h</p>
    <p><b>📞 WhatsApp:</b> (84) 9 88687921</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
